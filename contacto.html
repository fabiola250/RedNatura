<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contacto — RedNatura</title>

  <!-- Estilos mínimos independientes para que funcione sin tocar CSS global -->
  <style>
    :root{
      --accent:#2563eb;
      --accent-dark:#1e3a8a;
      --bg:#f5f8ff;
      --card:#ffffff;
      --muted:#6b7280;
      --radius:12px;
      --shadow: 0 6px 18px rgba(16,24,40,0.08);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    body{ margin:0; background:radial-gradient(circle at 80% 8%,#dbeafe 0,transparent 28%),linear-gradient(180deg,#eff6ff 0%,#fbfdff 100%); color:#0f172a; -webkit-font-smoothing:antialiased; padding:24px; box-sizing:border-box;}
    .contact-section{ max-width:920px; margin:28px auto; background:var(--card); border:1px solid #dbeafe; border-radius:20px; box-shadow:0 24px 60px rgba(30,58,138,.12); padding:34px; }
    h2{ margin:0 0 12px 0; color:var(--accent-dark); }
    p.lead{ color:var(--muted); margin-top:0; }

    form#contact-form{ display:grid; gap:12px; grid-template-columns: 1fr 1fr; }
    form#contact-form .full { grid-column: 1 / -1; }
    input, textarea, select{
      width:100%; padding:13px 14px; border-radius:10px; border:1px solid #dbe4f3; background:#fbfdff; font-size:15px; box-sizing:border-box;
      outline: none;
    }
    input:focus,textarea:focus{border-color:#60a5fa;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
    textarea{ min-height:140px; resize:vertical; }
    .btn-send{
      background: linear-gradient(180deg,var(--accent),var(--accent-dark)); color:white; border:none; padding:12px 16px; border-radius:10px;
      cursor:pointer; font-weight:700; font-size:15px; box-shadow:0 12px 24px rgba(37,99,235,.22);
    }
    .btn-send:active{ transform:translateY(1px); }
    .contact-meta{ display:flex; gap:12px; align-items:center; color:var(--muted); font-size:14px; margin-top:8px; }

    .flash { margin-top:12px; padding:10px 12px; border-radius:8px; display:none; }
    .flash.success{ background:#eff6ff; color:#1e3a8a; border:1px solid #bfdbfe; display:block; }
    .flash.error{ background:#fff1f2; color:#9f1239; border:1px solid #fecaca; display:block; }

    /* Responsive */
    @media (max-width:720px){
      form#contact-form{ grid-template-columns: 1fr; }
      .contact-section{ padding:18px; margin:18px; }
    }

    /* Pequeños estilos para enlaces dentro del flash */
    .flash a{ color:var(--accent); text-decoration:underline; }

    /* resaltado del producto preseleccionado */
    .prefill-box{ background:#eff6ff; border:1px solid #bfdbfe; padding:10px 12px; border-radius:8px; color:#1e3a8a; font-weight:700; }
    .form-actions{display:flex;justify-content:flex-end;grid-column:1/-1}
    .whatsapp-contact{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:22px;padding:17px 18px;border-radius:14px;background:linear-gradient(135deg,#123c68,#1d4f91);color:#fff;text-decoration:none;box-shadow:0 14px 30px rgba(18,60,104,.2)}
    .whatsapp-contact span{display:block}.whatsapp-contact small{display:block;margin-top:4px;color:#dbeafe}.whatsapp-contact strong{font-size:1rem}.whatsapp-contact b{font-size:1.4rem}
  </style>
</head>
<body>

  <main class="contact-section" role="main" aria-labelledby="contact-title">
    <header>
      <h2 id="contact-title">Contacto</h2>
      <p class="lead">¿Tienes dudas o deseas realizar un pedido? Completa el formulario y nos pondremos en contacto.</p>
    </header>

    <form aria-label='Formulario de contacto' id='contact-form' method='POST' name='contacto'>
      <input type="hidden" name="form-name" value="contacto">
      <p hidden><label>No llenar: <input name="bot-field"></label></p>
      <!-- Campos -->
      <input type="text" name="nombre" id="nombre" placeholder="Nombre completo" required autocomplete="name">
      <input type="email" name="correo" id="correo" placeholder="Correo electrónico" required autocomplete="email">

      <input class="full" type="tel" name="telefono" id="telefono" placeholder="Teléfono" inputmode="tel" autocomplete="tel" required>
      <input class="full" type="text" name="lugar_nacimiento" id="lugar_nacimiento" placeholder="Lugar de nacimiento" required>

      <input class="full" type="date" name="fecha_nacimiento" id="fecha_nacimiento" placeholder="Fecha de nacimiento" required>

      <input class="full" type="text" name="asunto" id="asunto" placeholder="Asunto (ej. Consulta sobre PROBI GO!)" required>

      <textarea class="full" name="mensaje" id="mensaje" placeholder="Escribe tu mensaje..." required></textarea>

      <!-- campo oculto para producto preseleccionado -->
      <input type="hidden" name="producto" id="producto-hidden" value="">

      <div class="form-actions">
        <button type="submit" class="btn-send" aria-label="Enviar mensaje">Enviar mensaje</button>
      </div>

      <div id="flash-messages" class="full"></div>
    </form>

    <div id="prefill-display" style="margin-top:14px"></div>

    <div class="contact-meta" aria-hidden="false" style="margin-top:16px;">
      <div>📞 <strong>Tel:</strong> <a href="tel:+52-5555070734">5555070734</a></div>
      <div>✉️ <strong>Email:</strong> <a href="mailto:fabiola250204@gmail.com">fabiola250204@gmail.com</a></div>
    </div>
    <a class="whatsapp-contact" href="https://wa.me/525555070734?text=Hola%2C%20quiero%20informaci%C3%B3n%20sobre%20los%20productos%20RedNatura" target="_blank" rel="noopener">
      <span><strong>¿Prefieres una respuesta directa?</strong><small>Escríbenos por WhatsApp al 55 5507 0734</small></span><b aria-hidden="true">→</b>
    </a>
  </main>

  <script>
    const flash = document.getElementById('flash-messages');
    function showFlashHtml(html, type='success'){
      flash.innerHTML = `<div class="flash ${type}">${html}</div>`;
    }

    // Prefill desde query params cuando venimos desde producto
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const producto = params.get('producto');
      const precio = params.get('precio');

      if (producto) {
        const prefill = document.getElementById('producto-hidden');
        if (prefill) prefill.value = producto;

        const caja = document.getElementById('prefill-display');
        caja.innerHTML = `<div class="prefill-box">Interesado en: ${producto}${precio? ' — ' + precio : ''}</div>`;
      }

      // si queremos pre‑llenar asunto y mensaje
      const asuntoInput = document.getElementById('asunto');
      const mensajeTextarea = document.getElementById('mensaje');
      if (producto && asuntoInput) asuntoInput.value = `Consulta / Pedido: ${producto}`;
      if (producto && mensajeTextarea) mensajeTextarea.value = `Hola, estoy interesada/o en el producto: ${producto}\nPrecio: ${params.get('precio') || ''}\nPor favor contáctenme.`;
    });

    document.getElementById('contact-form').addEventListener('submit', async function(event){
      event.preventDefault();
      const form = event.currentTarget;
      const button = form.querySelector('button[type="submit"]');
      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = 'Enviando...';

      try {
        const response = await fetch('/', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: new URLSearchParams(new FormData(form)).toString()
        });
        if (!response.ok) throw new Error('No se pudo enviar el formulario');
        showFlashHtml('¡Mensaje enviado! Gracias, te contactaremos pronto.', 'success');
        form.reset();
      } catch (error) {
        console.error('Error enviando formulario:', error);
        showFlashHtml('No pudimos enviar el mensaje. Intenta nuevamente o contáctanos por WhatsApp.', 'error');
      } finally {
        button.disabled = false;
        button.textContent = originalText;
      }
    });
  </script>

  <noscript>
    <div style="max-width:920px;margin:20px auto;padding:12px;background:#fff9e6;border-radius:8px;border:1px solid #f5e1a4;">
      Para enviar el formulario, asegúrate de que JavaScript esté habilitado o utiliza el correo: <a href="mailto:fabiola250204@gmail.com">fabiola250204@gmail.com</a>
    </div>
  </noscript>
</body>
</html>
