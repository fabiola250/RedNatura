<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Producto - RedNatura</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <h1>🌿 RedNatura</h1>
        <p>Suplementos alimenticios naturales</p>
      </div>
      <ul class="nav-links">
        <li><a href="index.html#bienvenida">Inicio</a></li>
        <li><a href="index.html#productos">Productos</a></li>
        <li><a href="index.html#sucursales">Sucursales</a></li>
        <li><a href="index.html#contacto">Contacto</a></li>
        <li><a href="#" onclick="toggleChat(); return false;" class="help-link">❓ Ayuda</a></li>
      </ul>
    </div>
  </nav>

  <!-- Contenido del producto -->
  <section class="productos">
    <div class="container">
      <div id="producto-detalle" class="producto-detail"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 RedNatura - Todos los derechos reservados | Representante: Fabiola</p>
  </footer>

  <!-- Chatbot -->
  <div id="chatbot" class="chatbot-container hidden">
    <div class="chatbot-header">
      <h3>🤖 Asistente RedNatura</h3>
      <button class="close-btn" onclick="toggleChat()">×</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-area">
      <input id="chat-input" type="text" placeholder="Escribe tu pregunta..." onkeypress="handleChatInput(event)">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

  <button class="chat-toggle" onclick="toggleChat()" title="Abrir chat">💬</button>

  <!-- Modal de Registro -->
  <div id="registro-modal" class="modal hidden">
    <div class="modal-content">
      <button class="close-modal" onclick="cerrarRegistro()">×</button>
      <h2>Registro de Interés</h2>
      <form id="registro-form" onsubmit="enviarRegistro(event)">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="tel" id="celular" placeholder="Celular" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="nacimiento" placeholder="Lugar de nacimiento" required>
        <input type="date" id="fecha-nacimiento" placeholder="Fecha de nacimiento" required>
        <textarea id="mensaje" placeholder="Mensaje (opcional)" rows="3"></textarea>
        <button type="submit" class="btn-submit">Enviar Solicitud</button>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/productos.js"></script>
  <script src="js/sucursales.js"></script>
  <script src="js/chatbot.js"></script>
  <script>
    // Obtener el ID desde la URL
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get("id"));
    const prod = productos.find(p => p.id === id);

    const detalleDiv = document.getElementById("producto-detalle");

    if (prod) {
      const tieneDescuento = prod.precio > 350;
      const precioDescuento = tieneDescuento ? Math.round(prod.precio * 0.7) : null;

      detalleDiv.innerHTML = `
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start;">
          <!-- Imagen izquierda -->
          <div style="text-align: center;">
            <img src="${prod.imagen}" alt="${prod.nombre}" style="max-width: 100%; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.15);">
            ${tieneDescuento ? `<p style="margin-top: 2rem; background: linear-gradient(135deg, #ffd89b 0%, #fff5d0 100%); color: #d84315; padding: 1rem; border-radius: 8px; font-weight: bold; border: 2px solid #ff9800; animation: glow 2s ease-in-out infinite;">✨ OFERTA LIMITADA - ¡AL INSCRIBIRSE HOY OBTENDRÁS 30% DE DESCUENTO! ✨</p>` : ''}
          </div>

          <!-- Detalles derecha -->
          <div>
            <h2 style="color: #2c3e7f; margin-bottom: 1rem; font-size: 2.2rem;">${prod.nombre}</h2>
            
            <div style="background: #f0f7ff; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
              <p style="font-size: 1.1rem; color: #666; margin-bottom: 1rem;"><strong>Presentación:</strong> ${prod.presentacion}</p>
              <p style="font-size: 1rem; color: #666; line-height: 1.8;">${prod.descripcionLarga}</p>
            </div>

            <div style="margin: 2rem 0;">
              <h3 style="color: #2c3e7f; margin-bottom: 0.8rem;">💰 Precio</h3>
              <p style="font-size: 2rem; font-weight: bold; color: #3498db; margin-bottom: 0.5rem;">$${prod.precio.toLocaleString('es-MX')}</p>
              ${tieneDescuento ? `<p style="font-size: 1.3rem; color: #27ae60; font-weight: bold;">💚 Con 30% DESC: $${precioDescuento.toLocaleString('es-MX')}</p>` : ''}
            </div>

            <button class="btn-producto" onclick="abrirModalRegistro()" style="width: calc(100% - 3rem); padding: 1rem; font-size: 1.1rem; margin-bottom: 1rem;">😊 Estoy Interesado</button>
            <a href="https://wa.me/5551234567?text=Estoy%20interesado%20en%20${encodeURIComponent(prod.nombre)}%20-%20$${prod.precio}" target="_blank" class="btn-whatsapp" style="width: calc(100% - 3rem); padding: 1rem; font-size: 1.1rem;">💬 Consultar por WhatsApp</a>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-top: 4rem;">
          <!-- Ingredientes -->
          <div>
            <h3 style="color: #2c3e7f; margin-bottom: 1rem; font-size: 1.3rem;">🧪 Ingredientes</h3>
            <ul style="list-style: none; padding: 0;">
              ${prod.ingredientes.map(i => `<li style="padding: 0.5rem 0; color: #666; border-bottom: 1px solid #e0e0e0;">✓ ${i}</li>`).join('')}
            </ul>
          </div>

          <!-- Beneficios -->
          <div>
            <h3 style="color: #2c3e7f; margin-bottom: 1rem; font-size: 1.3rem;">⭐ Beneficios</h3>
            <ul style="list-style: none; padding: 0;">
              ${prod.beneficios.map(b => `<li style="padding: 0.5rem 0; color: #666; border-bottom: 1px solid #e0e0e0;">✓ ${b}</li>`).join('')}
            </ul>
          </div>
        </div>

        <div style="margin-top: 3rem; background: #f8f9fa; padding: 2rem; border-radius: 8px;">
          <h3 style="color: #2c3e7f; margin-bottom: 1rem; font-size: 1.3rem;">📋 Modo de Uso</h3>
          <p style="color: #666; font-size: 1.1rem; line-height: 1.8;">${prod.modoUso}</p>
        </div>
      `;
    } else {
      detalleDiv.innerHTML = "<p style='text-align: center; color: #666; padding: 2rem;'>Producto no encontrado.</p>";
    }

    function abrirModalRegistro() {
      const modal = document.getElementById('registro-modal');
      const titulo = modal.querySelector('h2');
      titulo.textContent = `Interés en: ${prod.nombre}`;
      modal.setAttribute('data-tipo', 'producto');
      modal.setAttribute('data-nombre', prod.nombre);
      modal.classList.remove('hidden');
      modal.classList.add('show');
    }

    function cerrarRegistro() {
      const modal = document.getElementById('registro-modal');
      modal.classList.add('hidden');
      modal.classList.remove('show');
    }

    function enviarRegistro(event) {
      event.preventDefault();
      
      const datos = {
        tipo: document.getElementById('registro-modal').getAttribute('data-tipo') || 'general',
        nombre: document.getElementById('nombre').value,
        celular: document.getElementById('celular').value,
        email: document.getElementById('email').value,
        nacimiento: document.getElementById('nacimiento').value,
        fechaNacimiento: document.getElementById('fecha-nacimiento').value,
        mensaje: document.getElementById('mensaje').value,
        fecha: new Date().toLocaleString('es-MX')
      };

      // Guardar en localStorage
      let registros = JSON.parse(localStorage.getItem('registrosRedNatura') || '[]');
      registros.push(datos);
      localStorage.setItem('registrosRedNatura', JSON.stringify(registros));

      console.log('Datos para enviar:', datos);
      alert(`¡Gracias ${datos.nombre}! Tu registro ha sido enviado.\nNos contactaremos al ${datos.celular}`);
      
      document.getElementById('registro-form').reset();
      cerrarRegistro();
    }
  </script>
</body>
</html>
