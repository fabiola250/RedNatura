<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RedNatura - Representante Fabiola</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <div class="logo">
        <h1>RedNatura</h1>
        <p>Suplementos alimenticios naturales</p>
      </div>
      <ul class="nav-links">
        <li><a href="#productos">Productos</a></li>
        <li><a href="#sucursales">Sucursales</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <!-- Sección Productos -->
  <section id="productos" class="productos">
    <div class="container">
      <h2>Nuestros Productos</h2>
      <div class="filtros">
        <button class="filtro-btn active" onclick="filtrarProductos('todos', this)">Todos</button>
        <button class="filtro-btn" onclick="filtrarProductos('Digestión', this)">Digestión</button>
        <button class="filtro-btn" onclick="filtrarProductos('Mental', this)">Mental</button>
        <button class="filtro-btn" onclick="filtrarProductos('Mujeres', this)">Mujeres</button>
        <!-- agrega más botones según tus categorías -->
      </div>
      <div id="productos-grid" class="productos-grid"></div>
    </div>
  </section>

  <!-- Sección Sucursales -->
  <section id="sucursales" class="sucursales">
    <div class="container">
      <h2>Nuestras Sucursales</h2>
      <div id="sucursales-grid" class="sucursales-grid"></div>
    </div>
  </section>

  <!-- Sección Contacto -->
  <section id="contacto" class="contacto">
    <div class="container">
      <h2>Contacto</h2>
      <p>Teléfono: 5555070734</p>
      <p>Email: fabiola250204@gmail.com</p>
    </div>
  </section>

  <!-- Chatbot -->
  <div id="chatbot" class="chatbot-container hidden">
    <div class="chatbot-header">
      <h3>Asistente RedNatura</h3>
      <button onclick="toggleChat()">Cerrar</button>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-area">
      <input id="chat-input" type="text" placeholder="Escribe aquí..." onkeypress="handleChatInput(event)">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>
  <button class="chat-toggle" onclick="toggleChat()">💬 Asistente</button>

  <!-- Scripts (orden correcto) -->
  <script src="js/productos.js"></script>
  <script src="js/sucursales.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
